spring:
  datasource:
    url: jdbc:${DATABASE_URL:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}}
    username: ${PGUSER:}
    password: ${PGPASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create
